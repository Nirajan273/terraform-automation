---
- name: Configure Development Environment (Node, pnpm, Docker)
  hosts: all
  become: true
  vars:
    # Set the desired Node.js major version
    node_version: "22"

  tasks:
    - name: Ensure prerequisite packages are installed
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    # --- DOCKER SETUP ---
    - name: Create directory for Docker APT keyring
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download official Docker GPG key
      get_url:
        url: https://docker.com
        dest: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Add official Docker repository to APT sources
      apt_repository:
        repo: "deb [arch={{ ansible_architecture if ansible_architecture != 'x86_64' else 'amd64' }} signed-by=/etc/apt/keyrings/docker.gpg] https://docker.com {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install official Docker Engine components
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: true

    - name: Add active user to the docker group (avoids sudo requirement)
      user:
        name: "{{ ansible_user | default(ansible_env.USER) }}"
        groups: docker
        append: true

    # --- NODE.JS & PNPM SETUP ---
    - name: Download NodeSource setup script
      get_url:
        url: "https://nodesource.com_{{ node_version }}.x"
        dest: /tmp/nodesource_setup.sh
        mode: '0755'

    - name: Execute NodeSource setup script
      command: /tmp/nodesource_setup.sh
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Enable Corepack globally
      command: corepack enable
      args:
        creates: /usr/bin/pnpm

    - name: Initialize and activate the latest stable version of pnpm
      command: corepack prepare pnpm@latest --activate
