name: "Proxmox GitOps"

on:
  push:
    branches: [ main ]
    paths:
      - "live/**"
  # Allows manual unlock from GitHub Actions UI
  workflow_dispatch:
    inputs:
      target_team:
        description: 'Team to unlock (e.g., Nirajan, Alpha, Cassandra_infra)'
        required: true
      lock_id:
        description: 'The Lock ID or Name (e.g., NJ/Cassandra_infra)'
        required: true

# Prevents multiple runs for the same branch/path from overlapping
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VAR_proxmox_api_url: ${{ secrets.PM_API_URL }}
  TF_VAR_proxmox_api_token_id: ${{ secrets.PM_API_TOKEN_ID }}
  TF_VAR_proxmox_api_token_secret: ${{ secrets.PM_API_TOKEN_SECRET }}
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
  TF_VAR_proxmox_user: ${{ secrets.PM_USER }}
  TF_VAR_proxmox_password: ${{ secrets.PM_PASSWORD }}

jobs:
  # --- JOB 1: THE PLAN ---
  plan:
    runs-on: self-hosted
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - team_name: "Nirajan"
            path: "live/team-Nirajan"
          # - team_name: "Alpha"
          #   path: "live/team-alpha"
          # - team_name: "Cassandra_infra"
          #   path: "live/team-cassandra"
    
    name: "Plan: ${{ matrix.team_name }}"
    outputs:
      should_apply: ${{ steps.check.outputs.changed }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        name: Check for changes
        run: |
          if git diff --quiet ${{ github.event.before }} ${{ github.event.after }} -- "${{ matrix.path }}"; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init & Plan
        if: steps.check.outputs.changed == 'true'
        working-directory: ${{ matrix.path }}
        run: |
          # Clean local cache to prevent self-hosted runner conflicts
          rm -rf .terraform
          terraform init -input=false
          
          # Using -lock=false here to prevent the Snap-based runner from hanging
          # on the final "Releasing state lock" step.
          terraform plan -no-color -out=tfplan -input=false -lock=false

      - name: Upload Plan
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.team_name }}-tfplan
          path: ${{ matrix.path }}/tfplan
          retention-days: 1

  # --- JOB 2: THE APPLY (Requires Approval) ---
  apply:
    needs: plan
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - team_name: "Nirajan"
            path: "live/team-Nirajan"
          # - team_name: "Alpha"
          #   path: "live/team-alpha"
          # - team_name: "Cassandra_infra"
          #   path: "live/team-cassandra"
    
    name: "Apply: ${{ matrix.team_name }}"
    environment: production
    
    steps:
      - uses: actions/checkout@v4

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.team_name }}-tfplan
          path: ${{ matrix.path }}
        continue-on-error: true 

      - name: Terraform Apply
        run: |
          if [ -f "${{ matrix.path }}/tfplan" ]; then
            cd ${{ matrix.path }}
            rm -rf .terraform
            terraform init -input=false
            # Apply using the plan file. -lock=false ensures we bypass any 
            # leftover ghost locks from the plan phase.
            terraform apply -auto-approve -input=false -lock=false tfplan
          else
            echo "No plan found for ${{ matrix.team_name }}. Skipping."
          fi

  # --- JOB 3: EMERGENCY UNLOCK ---
  # Trigger this manually from the Actions tab if things get stuck
  force-unlock:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Manual Force Unlock
        run: |
          case "${{ github.event.inputs.target_team }}" in
            "Nirajan") PATH_DIR="live/team-Nirajan" ;;
            "Alpha") PATH_DIR="live/team-alpha" ;;
            "Cassandra_infra") PATH_DIR="live/team-cassandra" ;;
            *) echo "Unknown team"; exit 1 ;;
          esac

          echo "Unlocking $PATH_DIR with ID ${{ github.event.inputs.lock_id }}"
          cd $PATH_DIR
          rm -rf .terraform
          terraform init -input=false
          terraform force-unlock -force ${{ github.event.inputs.lock_id }}